services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: centercrm
      POSTGRES_PASSWORD: centercrm
      POSTGRES_DB: centercrm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U centercrm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../apps/api:/app/apps/api
      - ../packages:/app/packages
      - storage_data:/app/storage

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    command: celery -A celery_app worker -l info -B
    working_dir: /app/workers
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../workers:/app/workers
      - ../apps/api:/app/apps/api
      - ../packages:/app/packages

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  storage_data:
